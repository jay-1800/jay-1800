<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
  color: #facc15;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  height: 250px;
  display: flex;
  align-items: flex-end;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.overlay {
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  width: 100%;
  padding: 10px;
}
</style>
</head>

<body>

<h1>🌍 Explore Cultures</h1>

<div class="grid">

  <div class="card" style="background:url('YOUR-IMAGE-LINK') center/cover;">
    <div class="overlay">
      <h3>Maasai</h3>
    </div>
  </div>

  <div class="card" style="background:url('YOUR-IMAGE-LINK') center/cover;">
    <div class="overlay">
      <h3>Himba</h3>
    </div>
  </div>

  <div class="card" style="background:url('YOUR-IMAGE-LINK') center/cover;">
    <div class="overlay">
      <h3>Zulu</h3>
    </div>
  </div>

</div>

</body>
</html>
